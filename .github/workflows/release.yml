name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify macOS signing secrets
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=0
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for notarized macOS releases"
              missing=1
            fi
          done
          exit "$missing"

      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -n 1)
          if [ -z "$CERT_INFO" ]; then
            echo "::error::Developer ID Application certificate was not found in the imported certificate"
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Build macOS installer
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri -- build --target universal-apple-darwin

      - name: Prepare macOS download asset
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p release-assets
          cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg release-assets/KeyPoint-macOS.dmg

      - name: Build Windows installers
        if: matrix.platform == 'windows-latest'
        run: npm run tauri:build:windows

      - name: Prepare Windows download assets
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $exe = Get-ChildItem src-tauri\target\release\bundle\nsis -Filter *.exe | Select-Object -First 1
          $msi = Get-ChildItem src-tauri\target\release\bundle\msi -Filter *.msi | Select-Object -First 1
          Copy-Item $exe.FullName release-assets\KeyPoint-Windows.exe
          Copy-Item $msi.FullName release-assets\KeyPoint-Windows.msi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          name: "KeyPoint ${{ github.ref_name }}"
          body: |
            Download KeyPoint for your operating system.

            - macOS: KeyPoint-macOS.dmg
            - Windows: KeyPoint-Windows.exe or KeyPoint-Windows.msi
          draft: false
          prerelease: false
          files: release-assets/*
