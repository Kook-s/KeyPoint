name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS installer
        if: matrix.platform == 'macos-latest'
        run: npm run tauri -- build --target universal-apple-darwin

      - name: Prepare macOS download asset
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p release-assets
          cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg release-assets/KeyPoint-macOS.dmg

      - name: Build Windows installers
        if: matrix.platform == 'windows-latest'
        run: npm run tauri:build:windows

      - name: Prepare Windows download assets
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $exe = Get-ChildItem src-tauri\target\release\bundle\nsis -Filter *.exe | Select-Object -First 1
          $msi = Get-ChildItem src-tauri\target\release\bundle\msi -Filter *.msi | Select-Object -First 1
          Copy-Item $exe.FullName release-assets\KeyPoint-Windows.exe
          Copy-Item $msi.FullName release-assets\KeyPoint-Windows.msi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          name: "KeyPoint ${{ github.ref_name }}"
          body: |
            Download KeyPoint for your operating system.

            - macOS: KeyPoint-macOS.dmg
            - Windows: KeyPoint-Windows.exe or KeyPoint-Windows.msi

            Note: the current macOS build is not Apple-notarized yet. If macOS blocks the app, open it with Control-click > Open or see docs/macos-install.md.
          draft: false
          prerelease: false
          files: release-assets/*
